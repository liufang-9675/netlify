<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能作文批改</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 800px;
      width: 100%;
      padding: 30px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      align-items: center;
    }
    .row label {
      font-weight: bold;
      width: 80px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
      font-size: 1rem;
    }
    .upload-section {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }
    #ocrStatus {
      color: #888;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      height: 200px;
      border: 1px solid #dcdfe6;
      border-radius: 10px;
      padding: 15px;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 15px;
      outline: none;
      font-family: inherit;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-right: 10px;
      transition: background 0.2s;
    }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-voice { background: #9b59b6; color: white; }
    .btn-voice:hover { background: #8e44ad; }
    .btn:disabled { background: #95a5a6; cursor: not-allowed; }

    .result-box {
      background: #f8fafb;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      line-height: 1.8;
      display: none;
    }
    .error {
      color: #e74c3c;
      background: #fdf0ef;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      display: none;
    }
    .loading { text-align: center; color: #666; margin: 15px 0; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 作文批改助手</h1>

    <!-- 老师输入题目 -->
    <div class="row">
      <label for="essayTitle">作文题目：</label>
      <input type="text" id="essayTitle" placeholder="例如：《我的理想》">
    </div>

    <!-- 学生上传手写照片 -->
    <div class="upload-section">
      <label for="photoUpload" class="btn btn-primary">📷 上传手写照片</label>
      <input type="file" id="photoUpload" accept="image/*" style="display:none;">
      <span id="ocrStatus">支持 jpg/png，自动识别文字</span>
    </div>

    <!-- 作文文本区域（识别后自动填入，也可手动编辑） -->
    <textarea id="essayText" placeholder="在此粘贴作文内容，或上传手写照片自动识别..."></textarea>

    <!-- 操作按钮 -->
    <div>
      <button class="btn btn-success" id="submitBtn">🔍 AI 批改</button>
      <button class="btn btn-voice" id="voiceBtn" disabled>🔊 语音朗读</button>
    </div>

    <div class="loading" id="loading">⏳ AI 正在批改，请稍候...</div>
    <div class="result-box" id="resultBox"></div>
    <div class="error" id="errorBox"></div>
  </div>

  <script>
    // ========== DOM 元素 ==========
    const titleInput = document.getElementById('essayTitle');
    const photoInput = document.getElementById('photoUpload');
    const ocrStatus = document.getElementById('ocrStatus');
    const essayText = document.getElementById('essayText');
    const submitBtn = document.getElementById('submitBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');

    let currentReviewText = '';
    let speechSynth = window.speechSynthesis;
    let utterance = null;
    let isSpeaking = false;

    // ========== 手写照片识别 (调用智谱云函数) ==========
    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      ocrStatus.textContent = '⏳ 正在识别手写文字...';
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const base64 = reader.result; // data:image/...;base64,...
          const res = await fetch('/.netlify/functions/ocr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imageBase64: base64 })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '识别失败');
          essayText.value = data.text || '';
          ocrStatus.textContent = '✅ 识别完成，可手动修改';
        } catch (err) {
          ocrStatus.textContent = '❌ 识别失败：' + err.message;
        }
      };
      reader.readAsDataURL(file);
    });

    // 触发文件选择
    document.querySelector('label[for="photoUpload"]').addEventListener('click', () => {
      photoInput.click();
    });

    // ========== 调用 DeepSeek 批改 ==========
    submitBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim();
      const essay = essayText.value.trim();
      if (!essay) {
        showError('请填写作文内容或上传手写照片');
        return;
      }

      hideMessages();
      loading.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/.netlify/functions/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            title: title || '未提供题目', 
            essay 
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');

        currentReviewText = data.review;
        resultBox.textContent = currentReviewText;
        resultBox.style.display = 'block';
        voiceBtn.disabled = false;   // 激活语音按钮
      } catch (err) {
        showError('批改失败：' + err.message);
      } finally {
        loading.style.display = 'none';
        submitBtn.disabled = false;
      }
    });

    // ========== 语音朗读批改结果 ==========
    voiceBtn.addEventListener('click', () => {
      if (!currentReviewText) return;

      if (isSpeaking) {
        speechSynth.cancel();
        isSpeaking = false;
        voiceBtn.textContent = '🔊 语音朗读';
        return;
      }

      utterance = new SpeechSynthesisUtterance(currentReviewText);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.9;
      utterance.onend = () => {
        isSpeaking = false;
        voiceBtn.textContent = '🔊 语音朗读';
      };
      utterance.onerror = () => {
        isSpeaking = false;
        voiceBtn.textContent = '🔊 语音朗读';
      };

      speechSynth.speak(utterance);
      isSpeaking = true;
      voiceBtn.textContent = '⏸️ 暂停朗读';
    });

    // ========== 辅助函数 ==========
    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function hideMessages() {
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
    }
  </script>
</body>
</html>
